<script>
/* ─────────────────────────────────────────────────────────────
   UTILITIES
───────────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);

function norm(s){
  if(s==null) return '';
  return String(s).toLowerCase().trim().replace(/\s+/g,' ');
}
function normDate(s){
  if(!s) return '';
  const d=String(s).trim();
  // formats: DD/MM/YYYY, YYYY-MM-DD, MM/DD/YYYY
  let m;
  if((m=d.match(/^(\d{4})-(\d{2})-(\d{2})$/))) return `${m[1]}-${m[2]}-${m[3]}`;
  if((m=d.match(/^(\d{2})\/(\d{2})\/(\d{4})$/))) return `${m[3]}-${m[2]}-${m[1]}`;
  if((m=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/))) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return d;
}
function parseNum(s){
  if(s==null||s==='') return 0;
  const str=String(s).trim().replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.');
  const v=parseFloat(str);
  return isNaN(v)?0:v;
}
function fmt(v,type){
  if(v==null||isNaN(v)) return '—';
  if(type==='brl') return 'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  if(type==='pct') return (v*100).toFixed(1)+'%';
  if(type==='int') return Math.round(v).toLocaleString('pt-BR');
  if(type==='dec') return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return v;
}

function isMetaSource(s){
  const n=norm(s);
  return ['meta-ads','meta ads','meta_ads','facebook','instagram','fb','ig','meta'].includes(n)||n.startsWith('meta')||n.startsWith('facebook')||n.startsWith('instagram');
}
function isGoogleSource(s){
  const n=norm(s);
  return ['google','google-ads','google ads','google_ads','googleads'].includes(n)||n.startsWith('google');
}
function isCapCampaign(s){
  return norm(s).includes(CAP_MARKER);
}

/* ─────────────────────────────────────────────────────────────
   CSV PARSER
───────────────────────────────────────────────────────────── */
function parseCSV(text){
  const lines=text.split(/\r?\n/);
  if(!lines.length) return [];
  const sep=lines[0].includes(';')?';':',';
  const headers=lines[0].split(sep).map(h=>h.trim().replace(/^"|"$/g,''));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line) continue;
    // simple CSV split (handles basic quoted fields)
    const vals=splitCSVLine(line,sep);
    const row={};
    headers.forEach((h,j)=>{ row[h]=vals[j]?vals[j].replace(/^"|"$/g,'').trim():''; });
    rows.push(row);
  }
  return rows;
}
function splitCSVLine(line,sep){
  const r=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===sep&&!inQ){r.push(cur);cur='';}
    else cur+=c;
  }
  r.push(cur);
  return r;
}

async function fetchCSV(url){
  const res=await fetch(url+'&_t='+Date.now(),{cache:'no-store'});
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text=await res.text();
  return parseCSV(text);
}

/* ─────────────────────────────────────────────────────────────
   DATE FILTER
───────────────────────────────────────────────────────────── */
function getDateRange(){
  return {start:$('date-start').value, end:$('date-end').value};
}
function inRange(dateStr){
  const {start,end}=getDateRange();
  if(!start&&!end) return true;
  const d=normDate(dateStr);
  if(start&&d<start) return false;
  if(end&&d>end) return false;
  return true;
}
function initDateRange(leads,meta,google){
  const all=[
    ...leads.map(r=>normDate(r.data_inscricao||r['data_inscricao'])),
    ...meta.map(r=>normDate(r.Day||r['Day'])),
    ...google.map(r=>normDate(r.Day||r['Day'])),
  ].filter(Boolean).sort();
  if(all.length){
    $('date-start').value=all[0];
    $('date-end').value=all[all.length-1];
  }
}

/* ─────────────────────────────────────────────────────────────
   JOIN LOGIC
───────────────────────────────────────────────────────────── */
function joinMetaLeads(metaRows,leadRows){
  // build map: date+camp+set+ad → leads
  const map={};
  leadRows.forEach(l=>{
    if(!isMetaSource(l.utm_source)) return;
    const key=[normDate(l.data_inscricao),norm(l.utm_campaign),norm(l.utm_medium),norm(l.utm_content)].join('|');
    if(!map[key]) map[key]=[];
    map[key].push(l);
  });
  return {map, keyFn:(r)=>[normDate(r.Day),norm(r['Campaign Name']),norm(r['Ad Set Name']),norm(r['Ad Name'])].join('|')};
}
function joinGoogleLeads(googleRows,leadRows){
  const map={};
  leadRows.forEach(l=>{
    if(!isGoogleSource(l.utm_source)) return;
    const key=[normDate(l.data_inscricao),norm(l.utm_campaign),norm(l.utm_medium),norm(l.utm_content)].join('|');
    if(!map[key]) map[key]=[];
    map[key].push(l);
  });
  return {map, keyFn:(r)=>[normDate(r.Day),norm(r['Campaign Name']),norm(r['Ad Group Name']),norm(r['Ad Name'])].join('|')};
}

/* ─────────────────────────────────────────────────────────────
   AGGREGATION HELPERS
───────────────────────────────────────────────────────────── */
function aggMeta(rows,leads_map,keyFn){
  const agg={};
  rows.forEach(r=>{
    const k=keyFn(r);
    if(!agg[k]) agg[k]={
      spent:0,impressions:0,clicks:0,pageviews:0,pixel_leads:0,reach:0,video3s:0,
      leads:[],
      day:normDate(r.Day),
      campaign:r['Campaign Name'],
      adset:r['Ad Set Name'],
      ad:r['Ad Name'],
    };
    const a=agg[k];
    a.spent+=parseNum(r['Amount Spent']);
    a.impressions+=parseNum(r.Impressions);
    a.clicks+=parseNum(r['Link Clicks']);
    a.pageviews+=parseNum(r['Landing Page Views']);
    a.pixel_leads+=parseNum(r.Leads);
    a.reach+=parseNum(r.Reach);
    a.video3s+=parseNum(r['3-Second Video Views']);
    (leads_map[k]||[]).forEach(l=>{ if(!a.leads.find(x=>x.email===l.email)) a.leads.push(l); });
  });
  return Object.values(agg);
}
function aggGoogle(rows,leads_map,keyFn){
  const agg={};
  rows.forEach(r=>{
    const k=keyFn(r);
    if(!agg[k]) agg[k]={
      spent:0,impressions:0,clicks:0,
      leads:[],
      day:normDate(r.Day),
      campaign:r['Campaign Name'],
      adgroup:r['Ad Group Name'],
      ad:r['Ad Name'],
    };
    const a=agg[k];
    a.spent+=parseNum(r['Cost (Spend)']||r['Cost']);
    a.impressions+=parseNum(r.Impressions);
    a.clicks+=parseNum(r.Clicks);
    (leads_map[k]||[]).forEach(l=>{ if(!a.leads.find(x=>x.email===l.email)) a.leads.push(l); });
  });
  return Object.values(agg);
}

function rollup(rows,groupFn){
  const map={};
  rows.forEach(r=>{
    const k=groupFn(r);
    if(!map[k]) map[k]={
      key:k,spent:0,impressions:0,clicks:0,pageviews:0,video3s:0,leads:[],_rows:[],
      _display:r,
    };
    const m=map[k];
    m.spent+=r.spent;
    m.impressions+=r.impressions;
    m.clicks+=r.clicks;
    m.pageviews+=(r.pageviews||0);
    m.video3s+=(r.video3s||0);
    r.leads.forEach(l=>{ if(!m.leads.find(x=>x.email===l.email)) m.leads.push(l); });
    m._rows.push(r);
  });
  return Object.values(map);
}

function kpis(r,taxed=true,hasFunnel=true){
  const spent=r.spent*(taxed?META_TAX:1);
  const leads=r.leads.length;
  const leadsA=r.leads.filter(l=>l.leadscore==='A'||l.leadscore==='A+').length;
  const cpl=leads?spent/leads:0;
  const cplA=leadsA?spent/leadsA:0;
  const txA=leads?leadsA/leads:0;
  const cpm=r.impressions?(spent/r.impressions)*1000:0;
  const ctr=r.impressions?r.clicks/r.impressions:0;
  const cpc=r.clicks?spent/r.clicks:0;
  const cpv=r.pageviews?spent/r.pageviews:0;
  const cr=r.clicks?r.pageviews/r.clicks:0;
  const hr=r.impressions?r.video3s/r.impressions:0;
  const convlp=r.pageviews?leads/r.pageviews:0;
  return {spent,leads,leadsA,cpl,cplA,txA,cpm,ctr,cpc,cpv,cr,hr,convlp};
}

/* ─────────────────────────────────────────────────────────────
   FILTER + APPLY
───────────────────────────────────────────────────────────── */
function filtered(){
  const leads=RAW.leads.filter(r=>inRange(r.data_inscricao));
  const meta=RAW.meta.filter(r=>inRange(r.Day)&&isCapCampaign(r['Campaign Name']));
  const google=RAW.google.filter(r=>inRange(r.Day)&&isCapCampaign(r['Campaign Name']));
  return {leads,meta,google};
}

/* ─────────────────────────────────────────────────────────────
   TABLE BUILDER
───────────────────────────────────────────────────────────── */
function buildTable(containerId,colDefs,dataRows,opts={}){
  const {onSelect,sortKey,selKey}=opts;
  const container=document.getElementById(containerId);
  if(!container) return;

  const tblId='tbl-'+containerId;
  container.innerHTML=`<div class="table-wrap"><table id="${tblId}">
    <thead><tr>${colDefs.map((c,i)=>`<th data-i="${i}" data-key="${c.key}">${c.label}<span class="sort-icon">↕</span></th>`).join('')}</tr></thead>
    <tbody></tbody>
  </table></div>`;

  const table=document.getElementById(tblId);
  const tbody=table.querySelector('tbody');

  let sortIdx=-1,sortDir=0;
  let selectedKey=null;

  function render(rows){
    tbody.innerHTML='';
    rows.forEach(r=>{
      const tr=document.createElement('tr');
      if(selKey&&r[selKey]===selectedKey) tr.classList.add('selected');
      tr.innerHTML=colDefs.map((c,i)=>`<td>${c.fmt?c.fmt(r[c.key],r):fmt(r[c.key],c.type)}</td>`).join('');
      tr.addEventListener('click',()=>{
        const k=selKey?r[selKey]:null;
        if(selectedKey===k){selectedKey=null;}else{selectedKey=k;}
        Array.from(tbody.querySelectorAll('tr')).forEach((t,j)=>{
          t.classList.toggle('selected',selKey&&rows[j][selKey]===selectedKey);
        });
        if(onSelect) onSelect(selectedKey);
      });
      tbody.appendChild(tr);
    });
  }

  function sortAndRender(){
    let rows=[...dataRows];
    if(sortIdx>=0&&sortDir!==0){
      const k=colDefs[sortIdx].key;
      rows.sort((a,b)=>{
        const av=a[k],bv=b[k];
        if(av==null) return 1;if(bv==null) return -1;
        return typeof av==='number'?(av-bv)*sortDir:(String(av).localeCompare(String(bv)))*sortDir;
      });
    }
    render(rows);
  }

  table.querySelectorAll('th').forEach(th=>{
    th.addEventListener('click',()=>{
      const i=parseInt(th.dataset.i);
      if(sortIdx===i){sortDir=sortDir===1?-1:sortDir===-1?0:1;}
      else{sortIdx=i;sortDir=1;}
      table.querySelectorAll('th').forEach((h,j)=>{
        h.classList.remove('sort-asc','sort-desc');
        if(j===sortIdx){h.classList.add(sortDir===1?'sort-asc':'sort-desc');}
      });
      sortAndRender();
    });
  });

  sortAndRender();
}

  comboChart('meta-combo',dLabels,[
    {type:'bar',label:'Gasto (R$)',data:dSpent,backgroundColor:'rgba(249,115,22,.2)',borderColor:'#F97316',borderWidth:1,yAxisID:'y'},
    {type:'bar',label:'Leads',data:dLeads,backgroundColor:'rgba(16,185,129,.2)',borderColor:'#10B981',borderWidth:1,yAxisID:'y'},
    {type:'line',label:'CPL (R$)',data:dCPL,borderColor:'#2563EB',borderWidth:2,pointRadius:3,tension:.4,fill:false,yAxisID:'y1'},
  ]);

  // content bar
  const contentMap={};
  leads.filter(l=>isMetaSource(l.utm_source)).forEach(l=>{
    const k=l.utm_content||'(vazio)';
    contentMap[k]=(contentMap[k]||0)+1;
  });
  const cEntries=Object.entries(contentMap).sort((a,b)=>b[1]-a[1]).slice(0,12);
  barChart('meta-content-bar',cEntries.map(e=>e[0]),cEntries.map(e=>e[1]),'Leads','#F97316');

  // term bar
  const termMap={};
  leads.filter(l=>isMetaSource(l.utm_source)).forEach(l=>{
    const k=l.utm_term||'(vazio)';
    termMap[k]=(termMap[k]||0)+1;
  });
  const tEntries=Object.entries(termMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  barChart('meta-term-bar',tEntries.map(e=>e[0]),tEntries.map(e=>e[1]),'Leads','#8B5CF6');

  // ── Tables ──
  const campRoll=rollup(rows,r=>r.campaign);
  const campData=campRoll.map(r=>{
    const k=kpis(r);
    return {name:r._display.campaign,...k,_roll:r};
  });

  const tablesEl=$('meta-tables');
  tablesEl.innerHTML=`
  <div class="section"><div class="section-title">Campanhas</div></div>
  <div class="tbl-pair">
    <div class="table-section">
      <div id="cont-meta-camp"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">CPL por Dia · por Campanha</div>
      <div class="chart-wrap" style="height:220px"><canvas id="meta-camp-line"></canvas></div>
    </div>
  </div>
  <div class="section" style="margin-top:22px"><div class="section-title">Conjuntos de Anúncios</div></div>
  <div class="tbl-pair">
    <div class="table-section">
      <div id="cont-meta-set"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">CPL por Dia · por Conjunto</div>
      <div class="chart-wrap" style="height:220px"><canvas id="meta-set-line"></canvas></div>
    </div>
  </div>
  <div class="section" style="margin-top:22px"><div class="section-title">Anúncios</div></div>
  <div class="tbl-pair">
    <div class="table-section">
      <div id="cont-meta-ad"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">CPL por Dia · por Anúncio</div>
      <div class="chart-wrap" style="height:220px"><canvas id="meta-ad-line"></canvas></div>
    </div>
  </div>`;

  const metaCols=[
    {key:'name',label:'Campanha/Conjunto/Anúncio',type:'str'},
    {key:'spent',label:'Gasto',type:'brl'},
    {key:'cpm',label:'CPM',type:'brl'},
    {key:'ctr',label:'CTR',type:'pct'},
    {key:'cr',label:'CR',type:'pct'},
    {key:'convlp',label:'Conv LP',type:'pct'},
    {key:'leads',label:'Leads',type:'int'},
    {key:'cpl',label:'CPL',type:'brl'},
    {key:'leadsA',label:'Leads A',type:'int'},
    {key:'cplA',label:'CPL-A',type:'brl'},
  ];

  let selCamp=null,selSet=null;

  function renderMetaCampLine(campFilter){
    const dayMap={};
    const cList=campFilter?[campFilter]:campData.map(c=>c.name);
    rows.forEach(r=>{
      if(campFilter&&norm(r.campaign)!==norm(campFilter)) return;
      const d=r.day;if(!d) return;
      if(!dayMap[d]) dayMap[d]={};
      const cn=r.campaign;
      if(!dayMap[d][cn]) dayMap[d][cn]={spent:0,leads:[]};
      dayMap[d][cn].spent+=r.spent*META_TAX;
      r.leads.forEach(l=>{ if(!dayMap[d][cn].leads.find(x=>x.email===l.email)) dayMap[d][cn].leads.push(l); });
    });
    const allDays=Object.keys(dayMap).sort();
    const dLabels=allDays.map(d=>d.slice(5));
    const camps=[...new Set(rows.filter(r=>!campFilter||norm(r.campaign)===norm(campFilter)).map(r=>r.campaign))];
    const datasets=camps.slice(0,8).map((c,i)=>({
      label:c,
      data:allDays.map(d=>{
        const dd=dayMap[d]&&dayMap[d][c];
        return dd&&dd.leads.length?dd.spent/dd.leads.length:null;
      }),
      borderColor:PALETTE[i%PALETTE.length],backgroundColor:'transparent',
      borderWidth:2,pointRadius:3,tension:.3,spanGaps:true,
    }));
    lineChart('meta-camp-line',dLabels,datasets);
  }

  buildTable('cont-meta-camp',metaCols,campData,{
    selKey:'name',
    onSelect:k=>{
      selCamp=k;
      renderMetaSetTable();
      renderMetaCampLine(k);
    }
  });
  renderMetaCampLine(null);

  function getSetData(campFilter){
    let r2=rows;
    if(campFilter) r2=r2.filter(r=>norm(r.campaign)===norm(campFilter));
    const setRoll=rollup(r2,r=>r.adset);
    return setRoll.map(r=>({name:r._display.adset,...kpis(r),_roll:r}));
  }

  function renderMetaSetTable(){
    const setData=getSetData(selCamp);
    buildTable('cont-meta-set',metaCols,setData,{
      selKey:'name',
      onSelect:k=>{
        selSet=k;
        renderMetaAdTable();
        renderMetaSetLine(selCamp,k);
      }
    });
    renderMetaSetLine(selCamp,null);
  }

  function renderMetaSetLine(campFilter,setFilter){
    const dayMap={};
    let r2=rows;
    if(campFilter) r2=r2.filter(r=>norm(r.campaign)===norm(campFilter));
    if(setFilter) r2=r2.filter(r=>norm(r.adset)===norm(setFilter));
    r2.forEach(r=>{
      const d=r.day;if(!d) return;
      if(!dayMap[d]) dayMap[d]={};
      const sn=r.adset;
      if(!dayMap[d][sn]) dayMap[d][sn]={spent:0,leads:[]};
      dayMap[d][sn].spent+=r.spent*META_TAX;
      r.leads.forEach(l=>{ if(!dayMap[d][sn].leads.find(x=>x.email===l.email)) dayMap[d][sn].leads.push(l); });
    });
    const allDays=Object.keys(dayMap).sort();
    const sets=[...new Set(r2.map(r=>r.adset))];
    const datasets=sets.slice(0,8).map((s,i)=>({
      label:s,
      data:allDays.map(d=>{
        const dd=dayMap[d]&&dayMap[d][s];
        return dd&&dd.leads.length?dd.spent/dd.leads.length:null;
      }),
      borderColor:PALETTE[i%PALETTE.length],backgroundColor:'transparent',
      borderWidth:2,pointRadius:3,tension:.3,spanGaps:true,
    }));
    lineChart('meta-set-line',allDays.map(d=>d.slice(5)),datasets);
  }

  function getAdData(campFilter,setFilter){
    let r2=rows;
    if(campFilter) r2=r2.filter(r=>norm(r.campaign)===norm(campFilter));
    if(setFilter) r2=r2.filter(r=>norm(r.adset)===norm(setFilter));
    const adRoll=rollup(r2,r=>r.ad);
    return adRoll.map(r=>({name:r._display.ad,...kpis(r),_roll:r}));
  }

  function renderMetaAdTable(){
    const adData=getAdData(selCamp,selSet);
    buildTable('cont-meta-ad',metaCols,adData,{
      selKey:'name',
      onSelect:k=>{ renderMetaAdLine(selCamp,selSet,k); }
    });
    renderMetaAdLine(selCamp,selSet,null);
  }

  function renderMetaAdLine(campFilter,setFilter,adFilter){
    const dayMap={};
    let r2=rows;
    if(campFilter) r2=r2.filter(r=>norm(r.campaign)===norm(campFilter));
    if(setFilter) r2=r2.filter(r=>norm(r.adset)===norm(setFilter));
    if(adFilter) r2=r2.filter(r=>norm(r.ad)===norm(adFilter));
    r2.forEach(r=>{
      const d=r.day;if(!d) return;
      if(!dayMap[d]) dayMap[d]={};
      const an=r.ad;
      if(!dayMap[d][an]) dayMap[d][an]={spent:0,leads:[]};
      dayMap[d][an].spent+=r.spent*META_TAX;
      r.leads.forEach(l=>{ if(!dayMap[d][an].leads.find(x=>x.email===l.email)) dayMap[d][an].leads.push(l); });
    });
    const allDays=Object.keys(dayMap).sort();
    const ads=[...new Set(r2.map(r=>r.ad))];
    const datasets=ads.slice(0,8).map((a,i)=>({
      label:a,
      data:allDays.map(d=>{
        const dd=dayMap[d]&&dayMap[d][a];
        return dd&&dd.leads.length?dd.spent/dd.leads.length:null;
      }),
      borderColor:PALETTE[i%PALETTE.length],backgroundColor:'transparent',
      borderWidth:2,pointRadius:3,tension:.3,spanGaps:true,
    }));
    lineChart('meta-ad-line',allDays.map(d=>d.slice(5)),datasets);
  }

  renderMetaSetTable();
  renderMetaAdTable();
}

/* ─────────────────────────────────────────────────────────────
   GOOGLE ADS PAGE
───────────────────────────────────────────────────────────── */
function renderGoogle(){
  const {leads,google}=filtered();
  const {map:gMap,keyFn:gKeyFn}=joinGoogleLeads(google,leads);
  const rows=aggGoogle(google,gMap,gKeyFn);

  const tot=rows.reduce((a,b)=>({
    spent:a.spent+b.spent,impressions:a.impressions+b.impressions,
    clicks:a.clicks+b.clicks,
    leads:[...a.leads,...b.leads.filter(l=>!a.leads.find(x=>x.email===l.email))]
  },{spent:0,impressions:0,clicks:0,leads:[]});

  const tl=tot.leads.length;
  const tA=tot.leads.filter(l=>l.leadscore==='A'||l.leadscore==='A+').length;

  // KPIs
  $('google-kpis').innerHTML=`
  <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="kpi-hero" style="background:linear-gradient(135deg,#10B981 0%,#059669 100%)">
      <div class="kpi-label">Gasto Total Google</div>
      <div class="kpi-value">${fmt(tot.spent,'brl')}</div>
      <div class="kpi-sub">sem multiplicador de imposto</div>
    </div>
    <div class="kpi-card accent-green">
      <div class="kpi-label">Impressões</div>
      <div class="kpi-value">${fmt(tot.impressions,'int')}</div>
      <div class="kpi-sub">CPM ${fmt(tot.impressions?(tot.spent/tot.impressions)*1000:0,'brl')}</div>
    </div>
    <div class="kpi-card accent-green">
      <div class="kpi-label">Cliques</div>
      <div class="kpi-value">${fmt(tot.clicks,'int')}</div>
      <div class="kpi-sub">CTR ${fmt(tot.impressions?tot.clicks/tot.impressions:0,'pct')}</div>
    </div>
    <div class="kpi-card accent-green">
      <div class="kpi-label">CPC</div>
      <div class="kpi-value">${fmt(tot.clicks?tot.spent/tot.clicks:0,'brl')}</div>
      <div class="kpi-sub">por clique</div>
    </div>
    <div class="kpi-card accent-blue">
      <div class="kpi-label">Leads</div>
      <div class="kpi-value">${fmt(tl,'int')}</div>
      <div class="kpi-sub">CPL ${fmt(tl?tot.spent/tl:0,'brl')}</div>
    </div>
    <div class="kpi-card accent-purple">
      <div class="kpi-label">Leads A / Taxa A</div>
      <div class="kpi-value">${fmt(tA,'int')}</div>
      <div class="kpi-sub">Tx ${fmt(tl?tA/tl:0,'pct')} · CPL-A ${fmt(tA?tot.spent/tA:0,'brl')}</div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div class="kpi-card">
      <div class="kpi-label">Tx Conversão (Leads/Cliques)</div>
      <div class="kpi-value">${fmt(tot.clicks?tl/tot.clicks:0,'pct')}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">CPL-A</div>
      <div class="kpi-value">${fmt(tA?tot.spent/tA:0,'brl')}</div>
    </div>
  </div>`;

  // Charts
  $('google-top-charts').innerHTML=`
  <div class="chart-card">
    <div class="chart-title">Gasto · Leads · CPL por Dia (Google Ads)</div>
    <div class="chart-wrap" style="height:220px"><canvas id="google-combo"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Leads por Campanha</div>
    <div class="chart-wrap" style="height:220px"><canvas id="google-camp-bar"></canvas></div>
  </div>`;

  // combo
  const dMap={};
  rows.forEach(r=>{
    const d=r.day;if(!d) return;
    if(!dMap[d]) dMap[d]={spent:0,leads:[]};
    dMap[d].spent+=r.spent;
    r.leads.forEach(l=>{ if(!dMap[d].leads.find(x=>x.email===l.email)) dMap[d].leads.push(l); });
  });
  const days=Object.keys(dMap).sort();
  comboChart('google-combo',days.map(d=>d.slice(5)),[
    {type:'bar',label:'Gasto (R$)',data:days.map(d=>dMap[d].spent),backgroundColor:'rgba(16,185,129,.2)',borderColor:'#10B981',borderWidth:1,yAxisID:'y'},
    {type:'bar',label:'Leads',data:days.map(d=>dMap[d].leads.length),backgroundColor:'rgba(37,99,235,.2)',borderColor:'#2563EB',borderWidth:1,yAxisID:'y'},
    {type:'line',label:'CPL (R$)',data:days.map(d=>dMap[d].leads.length?dMap[d].spent/dMap[d].leads.length:0),borderColor:'#F97316',borderWidth:2,pointRadius:3,tension:.4,fill:false,yAxisID:'y1'},
  ]);

  // camp bar
  const campRoll=rollup(rows,r=>r.campaign);
  const campBars=campRoll.map(r=>({name:r._display.campaign,leads:r.leads.length})).sort((a,b)=>b.leads-a.leads).slice(0,10);
  barChart('google-camp-bar',campBars.map(r=>r.name),campBars.map(r=>r.leads),'Leads','#10B981');

  // Tables
  const gTablesEl=$('google-tables');
  gTablesEl.innerHTML=`
  <div class="section"><div class="section-title">Campanhas</div></div>
  <div class="tbl-pair">
    <div class="table-section"><div id="cont-g-camp"></div></div>
    <div class="chart-card">
      <div class="chart-title">CPL por Dia · por Campanha</div>
      <div class="chart-wrap" style="height:220px"><canvas id="g-camp-line"></canvas></div>
    </div>
  </div>
  <div class="section" style="margin-top:22px"><div class="section-title">Grupos de Anúncios</div></div>
  <div class="tbl-pair">
    <div class="table-section"><div id="cont-g-group"></div></div>
    <div class="chart-card">
      <div class="chart-title">CPL por Dia · por Grupo</div>
      <div class="chart-wrap" style="height:220px"><canvas id="g-group-line"></canvas></div>
    </div>
  </div>
  <div class="section" style="margin-top:22px"><div class="section-title">Anúncios</div></div>
  <div class="tbl-pair">
    <div class="table-section"><div id="cont-g-ad"></div></div>
    <div class="chart-card">
      <div class="chart-title">CPL por Dia · por Anúncio</div>
      <div class="chart-wrap" style="height:220px"><canvas id="g-ad-line"></canvas></div>
    </div>
  </div>`;

  const gCols=[
    {key:'name',label:'Campanha/Grupo/Anúncio',type:'str'},
    {key:'spent',label:'Gasto',type:'brl'},
    {key:'impressions',label:'Impressões',type:'int'},
    {key:'clicks',label:'Cliques',type:'int'},
    {key:'ctr',label:'CTR',type:'pct'},
    {key:'cpc',label:'CPC',type:'brl'},
    {key:'leads',label:'Leads',type:'int'},
    {key:'cpl',label:'CPL',type:'brl'},
    {key:'leadsA',label:'Leads A',type:'int'},
    {key:'cplA',label:'CPL-A',type:'brl'},
  ];

  function gKpis(r){
    const spent=r.spent;
    const leads=r.leads.length;
    const leadsA=r.leads.filter(l=>l.leadscore==='A'||l.leadscore==='A+').length;
    return {
      spent,impressions:r.impressions,clicks:r.clicks,leads,leadsA,
      cpl:leads?spent/leads:0,
      cplA:leadsA?spent/leadsA:0,
      ctr:r.impressions?r.clicks/r.impressions:0,
      cpc:r.clicks?spent/r.clicks:0,
    };
  }

  const gCampRoll=rollup(rows,r=>r.campaign);
  const gCampData=gCampRoll.map(r=>({name:r._display.campaign,...gKpis(r),_roll:r}));

  let gSelCamp=null,gSelGroup=null;

  function buildGLine(canvasId,rows2,dimFn){
    const dayMap={};
    rows2.forEach(r=>{
      const d=r.day;if(!d) return;
      const dn=dimFn(r);
      if(!dayMap[d]) dayMap[d]={};
      if(!dayMap[d][dn]) dayMap[d][dn]={spent:0,leads:[]};
      dayMap[d][dn].spent+=r.spent;
      r.leads.forEach(l=>{ if(!dayMap[d][dn].leads.find(x=>x.email===l.email)) dayMap[d][dn].leads.push(l); });
    });
    const allDays=Object.keys(dayMap).sort();
    const dims=[...new Set(rows2.map(r=>dimFn(r)))];
    const datasets=dims.slice(0,8).map((a,i)=>({
      label:a,
      data:allDays.map(d=>{ const dd=dayMap[d]&&dayMap[d][a]; return dd&&dd.leads.length?dd.spent/dd.leads.length:null; }),
      borderColor:PALETTE[i%PALETTE.length],backgroundColor:'transparent',
      borderWidth:2,pointRadius:3,tension:.3,spanGaps:true,
    }));
    lineChart(canvasId,allDays.map(d=>d.slice(5)),datasets);
  }

  buildTable('cont-g-camp',gCols,gCampData,{
    selKey:'name',
    onSelect:k=>{
      gSelCamp=k;
      renderGGroupTable();
      buildGLine('g-camp-line',rows,r=>r.campaign);
    }
  });
  buildGLine('g-camp-line',rows,r=>r.campaign);

  function renderGGroupTable(){
    let r2=rows;
    if(gSelCamp) r2=r2.filter(r=>norm(r.campaign)===norm(gSelCamp));
    const gRoll=rollup(r2,r=>r.adgroup);
    const gData=gRoll.map(r=>({name:r._display.adgroup,...gKpis(r)}));
    buildTable('cont-g-group',gCols,gData,{
      selKey:'name',
      onSelect:k=>{ gSelGroup=k; renderGAdTable(); buildGLine('g-group-line',r2,r=>r.adgroup); }
    });
    buildGLine('g-group-line',r2,r=>r.adgroup);
  }

  function renderGAdTable(){
    let r2=rows;
    if(gSelCamp) r2=r2.filter(r=>norm(r.campaign)===norm(gSelCamp));
    if(gSelGroup) r2=r2.filter(r=>norm(r.adgroup)===norm(gSelGroup));
    const gRoll=rollup(r2,r=>r.ad);
    const gData=gRoll.map(r=>({name:r._display.ad,...gKpis(r)}));
    buildTable('cont-g-ad',gCols,gData,{
      selKey:'name',
      onSelect:k=>{ buildGLine('g-ad-line',r2.filter(x=>norm(x.ad)===norm(k)),r=>r.ad); }
    });
    buildGLine('g-ad-line',r2,r=>r.ad);
  }

  renderGGroupTable();
  renderGAdTable();
}

/* ─────────────────────────────────────────────────────────────
   RENDER ALL
───────────────────────────────────────────────────────────── */
function renderAll(){
  const activePage=document.querySelector('.nav-item.active')?.dataset.page||'overview';
  renderOverview();
  if(activePage==='meta') renderMeta();
  if(activePage==='google') renderGoogle();
}

function renderPage(page){
  if(page==='overview') renderOverview();
  else if(page==='meta') renderMeta();
  else if(page==='google') renderGoogle();
}

/* ─────────────────────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────────────────────── */
const TITLES={overview:'Visão Geral da Captura',meta:'Meta Ads · Captura',google:'Google Ads · Captura'};
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const page=btn.dataset.page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    $('topbar-title').textContent=TITLES[page]||page;
    renderPage(page);
  });
});

/* ─────────────────────────────────────────────────────────────
   DATE CHANGE
───────────────────────────────────────────────────────────── */
['date-start','date-end'].forEach(id=>{
  $(id).addEventListener('change',()=>{
    const page=document.querySelector('.nav-item.active')?.dataset.page||'overview';
    renderPage(page);
  });
});

/* ─────────────────────────────────────────────────────────────
   LOAD DATA
───────────────────────────────────────────────────────────── */
async function loadData(){
  $('loading-overlay').style.display='flex';
  try{
    const [leads,meta,google]=await Promise.all([
      fetchCSV(CSV_LEADS),
      fetchCSV(CSV_META),
      fetchCSV(CSV_GOOGLE),
    ]);
    RAW={leads,meta,google};
    initDateRange(leads,meta,google);
    $('last-update').textContent='Atualizado: '+new Date().toLocaleString('pt-BR');
    renderAll();
  }catch(e){
    console.error(e);
    $('content').innerHTML=`<div class="error-msg">⚠️ Erro ao carregar dados: ${e.message}. Verifique os links dos CSVs e a conexão com a internet.</div>`;
  }finally{
    $('loading-overlay').style.display='none';
  }
}

$('btn-refresh').addEventListener('click',loadData);

// Init
loadData();
</script>
